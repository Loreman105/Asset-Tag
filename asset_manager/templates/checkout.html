{% extends "base.html" %}
{% block title %}Check Out {{ asset.asset_id }}{% endblock %}
{% block content %}
<h1 class="h2 mb-3">Check Out {{ asset.asset_id }}</h1>
<form class="card card-body" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row g-3">
        <div class="col-md-6"><label class="form-label">User Receiving Asset</label><select class="form-select" name="user_receiving_id" required>{% for user in users %}<option value="{{ user.id }}">{{ user.full_name }}</option>{% endfor %}</select></div>
        <div class="col-md-3"><label class="form-label">Expected Return Date</label><input class="form-control" type="date" name="expected_return_date" required></div>
        <div class="col-md-3"><label class="form-label">Checkout Condition</label><select class="form-select" name="checkout_condition" required>{% for condition in ['Excellent','Good','Fair','Poor','Damaged'] %}<option value="{{ condition }}">{{ condition }}</option>{% endfor %}</select></div>
        <div class="col-12"><label class="form-label">Checkout Notes</label><textarea class="form-control" name="checkout_notes" required></textarea></div>
    </div>
    <div class="mt-3"><button class="btn btn-primary" type="submit">Check Out Asset</button></div>
</form>
{% endblock %}
