{% extends "base.html" %}
{% block title %}{{ title }} - Church Asset Manager{% endblock %}
{% block content %}
<h1 class="h2 mb-3">{{ title }}</h1>
<form class="card card-body" method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row g-3">
        {% if not asset.id %}
        <div class="col-md-4">
            <label class="form-label">Department Prefix</label>
            <select class="form-select" name="department_code" required>
                {% for department in departments %}<option value="{{ department.code }}">{{ department.code }} - {{ department.name }}</option>{% endfor %}
            </select>
        </div>
        {% endif %}
        <div class="col-md-8"><label class="form-label">Description</label><input class="form-control" name="description" value="{{ asset.description or '' }}" required></div>
        <div class="col-md-4"><label class="form-label">Category</label><input class="form-control" list="categories" name="category" value="{{ asset.category or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Manufacturer</label><input class="form-control" name="manufacturer" value="{{ asset.manufacturer or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Model Number</label><input class="form-control" name="model_number" value="{{ asset.model_number or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Serial Number</label><input class="form-control" name="serial_number" value="{{ asset.serial_number or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Ministry</label><input class="form-control" name="ministry" value="{{ asset.ministry or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Status</label><select class="form-select" name="status">{% for status in statuses %}<option value="{{ status.name }}" {% if asset.status == status.name %}selected{% endif %}>{{ status.name }}</option>{% endfor %}</select></div>
        <div class="col-md-4"><label class="form-label">Assigned User</label><select class="form-select" name="assigned_user_id"><option value="">Unassigned</option>{% for user in users %}<option value="{{ user.id }}" {% if asset.assigned_user_id == user.id %}selected{% endif %}>{{ user.full_name }}</option>{% endfor %}</select></div>
        <div class="col-md-4"><label class="form-label">Current Location</label><input class="form-control" name="current_location" value="{{ asset.current_location or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Condition</label><select class="form-select" name="condition">{% for condition in ['Excellent','Good','Fair','Poor','Damaged'] %}<option value="{{ condition }}" {% if asset.condition == condition %}selected{% endif %}>{{ condition }}</option>{% endfor %}</select></div>
        <div class="col-md-4"><label class="form-label">Purchase Date</label><input class="form-control" type="date" name="purchase_date" value="{{ asset.purchase_date or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Purchase Cost</label><input class="form-control" type="number" step="0.01" name="purchase_cost" value="{{ asset.purchase_cost or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Vendor</label><input class="form-control" name="vendor" value="{{ asset.vendor or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Warranty Provider</label><input class="form-control" name="warranty_provider" value="{{ asset.warranty_provider or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Warranty Expiration</label><input class="form-control" type="date" name="warranty_expiration_date" value="{{ asset.warranty_expiration_date or '' }}"></div>
        <div class="col-12"><label class="form-label">Warranty Notes</label><textarea class="form-control" name="warranty_notes">{{ asset.warranty_notes or '' }}</textarea></div>
        <div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" name="notes">{{ asset.notes or '' }}</textarea></div>
        <div class="col-md-6"><label class="form-label">Asset Photos</label><input class="form-control" type="file" name="photos" multiple accept=".jpg,.jpeg,.png,.webp"></div>
        <div class="col-md-6"><label class="form-label">Asset Documents</label><input class="form-control" type="file" name="documents" multiple></div>
    </div>
    <datalist id="categories">{% for category in categories %}<option value="{{ category.name }}">{% endfor %}</datalist>
    <div class="mt-4"><button class="btn btn-primary" type="submit">Save Asset</button></div>
</form>
{% endblock %}
