{% extends "base.html" %}
{% block title %}Check In/Out - Church Asset Manager{% endblock %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
    <div>
        <h1 class="h2">Check In/Out</h1>
        <p class="text-body-secondary mb-0">Scan a barcode or enter an asset number.</p>
    </div>
</div>

<ul class="nav nav-tabs mb-3" id="checkoutTabs" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link {% if mode != 'checkin' %}active{% endif %}" id="checkout-tab" data-bs-toggle="tab" data-bs-target="#checkout-panel" type="button" role="tab">Check Out</button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link {% if mode == 'checkin' %}active{% endif %}" id="checkin-tab" data-bs-toggle="tab" data-bs-target="#checkin-panel" type="button" role="tab">Check In</button>
    </li>
</ul>

<div class="tab-content">
    <section class="tab-pane fade {% if mode != 'checkin' %}show active{% endif %}" id="checkout-panel" role="tabpanel" aria-labelledby="checkout-tab" tabindex="0">
        <form class="card card-body quick-checkout-form" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="mode" value="checkout">
            <div class="row g-3 align-items-end">
                <div class="col-lg-5">
                    <label class="form-label" for="checkout_asset_code">Asset Number or Barcode</label>
                    <input class="form-control form-control-lg" id="checkout_asset_code" name="asset_code" value="{{ asset_code if mode != 'checkin' else '' }}" autocomplete="off" autofocus required>
                </div>
                <div class="col-lg-5">
                    <label class="form-label" for="user_receiving_id">Check Out To</label>
                    <select class="form-select form-select-lg" id="user_receiving_id" name="user_receiving_id" required>
                        <option value="">Select a user</option>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-lg-2 d-grid">
                    <button class="btn btn-primary btn-lg" type="submit">Check Out</button>
                </div>
            </div>
        </form>
    </section>

    <section class="tab-pane fade {% if mode == 'checkin' %}show active{% endif %}" id="checkin-panel" role="tabpanel" aria-labelledby="checkin-tab" tabindex="0">
        <form class="card card-body quick-checkout-form" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="mode" value="checkin">
            <div class="row g-3 align-items-end">
                <div class="col-lg-10">
                    <label class="form-label" for="checkin_asset_code">Asset Number or Barcode</label>
                    <input class="form-control form-control-lg" id="checkin_asset_code" name="asset_code" value="{{ asset_code if mode == 'checkin' else '' }}" autocomplete="off" required>
                </div>
                <div class="col-lg-2 d-grid">
                    <button class="btn btn-primary btn-lg" type="submit">Check In</button>
                </div>
            </div>
        </form>
    </section>
</div>
{% endblock %}
