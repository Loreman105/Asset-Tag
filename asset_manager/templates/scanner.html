{% extends "base.html" %}
{% block title %}Camera Scanner - Church Asset Manager{% endblock %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
    <div>
        <h1 class="h2">Camera Scanner</h1>
        <p class="text-body-secondary mb-0">Scan or enter an asset tag to jump into the next action.</p>
    </div>
</div>

<form class="card card-body scanner-panel" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row g-3 align-items-end">
        <div class="col-lg-5">
            <label class="form-label">Asset tag</label>
            <input class="form-control form-control-lg" id="asset_code" name="asset_code" autocomplete="off" autofocus required>
        </div>
        <div class="col-lg-3">
            <label class="form-label">Action</label>
            <select class="form-select form-select-lg" name="action">
                <option value="detail">Open asset</option>
                {% if current_user.can_manage_assets() %}
                <option value="checkout">Check out</option>
                <option value="checkin">Check in</option>
                <option value="maintenance">Maintenance</option>
                {% endif %}
            </select>
        </div>
        <div class="col-lg-4 d-flex flex-wrap gap-2">
            <button class="btn btn-primary btn-lg" type="submit">Go</button>
            <button class="btn btn-outline-primary btn-lg" type="button" id="startBarcodeScan">Use Camera</button>
            <button class="btn btn-outline-secondary btn-lg d-none" type="button" id="stopBarcodeScan">Stop</button>
        </div>
    </div>
    <video id="barcodeVideo" class="barcode-video d-none mt-3" playsinline muted></video>
    <div id="scannerStatus" class="small text-body-secondary mt-2"></div>
</form>
{% endblock %}
